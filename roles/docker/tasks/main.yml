---
- name: Check if docker binary exists
  command: docker --version
  register: docker_check
  ignore_errors: yes
  changed_when: false

- name: Set docker_installed fact
  set_fact:
    docker_installed: "{{ docker_check.rc == 0 }}"

- name: Debug docker state
  debug:
    msg: "Docker installed: {{ docker_installed }}"

- name: Skip host if Docker exists
  meta: end_host
  when: docker_installed

# =========================
# INSTALLATION
# =========================

- name: Install dependencies
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    update_cache: yes

- name: Create keyring dir
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker GPG key
  shell: |
    curl -fsSL https://download.docker.com/linux/debian/gpg | \
    gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Add Docker repo
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
    filename: docker
    state: present

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    update_cache: yes

- name: Ensure Docker is running
  systemd:
    name: docker
    state: started
    enabled: yes
