docker_version: "5:29.4.1-1~debian.12~bookworm"
docker_packages:
  - "docker-ce={{ docker_version }}"
  - "docker-ce-cli={{ docker_version }}"
  - containerd.io

docker_config:
  log-driver: "json-file"
  log-opts:
    max-size: "50m"
    max-file: "3"
  live-restore: true
  icc: false
  no-new-privileges: true
